[package]
name = "teamconference-client"
version = "0.2.0"
edition = "2021"
description = "TeamConference Slint-Client mit Barrierefreiheits-Fokus"

[dependencies]
slint = "1.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }
rustls = { version = "0.23", features = ["ring"] }
rustls-pki-types = "1"
futures-util = "0.3"
cpal = "0.15"
symphonia = { version = "0.5", features = ["all"] }
opus = "0.3"
crossbeam-channel = "0.5"
base64 = "0.22"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dirs = "6"
parking_lot = "0.12"
rfd = "0.15"
chrono = "0.4"

[build-dependencies]
slint-build = "1.10"

[profile.dev]
opt-level = 2
