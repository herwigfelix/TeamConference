name: Release Client

# Baut den TeamConference-Client für Windows, macOS und Linux
# (Debian/Ubuntu als .deb + .tar.gz, Arch als .pkg.tar.zst).
# - Bei Push eines Tags v* werden die Artefakte an ein GitHub-Release gehängt.
# - Manuell (workflow_dispatch) entstehen herunterladbare Build-Artefakte
#   ohne Release (zum Testen).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon (arm64)
            label: macOS arm64
          - os: macos-15-intel    # Intel (x86_64)
            label: macOS x86_64
          - os: windows-latest    # x64, MSVC vorinstalliert
            label: Windows x64

    steps:
      - uses: actions/checkout@v4

      # Stable Rust mit plattformüblichem Host (auf Windows automatisch MSVC).
      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      # Compile-Caches zwischen Läufen wiederverwenden
      - name: Cargo-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client

      # CMake ist auf den GitHub-Runnern vorinstalliert; sicherheitshalber prüfen.
      - name: CMake-Version
        run: cmake --version

      # Developer-ID-Zertifikat in einen temporären Keychain importieren und den
      # App-Store-Connect-API-Key (.p8) für notarytool ablegen. Läuft nur auf
      # macOS und überspringt sich selbst, wenn die Secrets fehlen (z. B. Forks)
      # — dann baut compile.sh ad-hoc weiter.
      - name: macOS – Signierung & Notarisierung vorbereiten
        if: runner.os != 'Windows'
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          if [ -z "$MAC_CERT_P12" ]; then
            echo "Keine Signatur-Secrets gesetzt — baue ad-hoc (unsigniert)."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          # Zertifikat (.p12) importieren und codesign Zugriff erlauben.
          echo "$MAC_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Neuen Keychain in die Suchliste aufnehmen (sonst findet codesign die
          # Identität nicht), vorhandene erhalten.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | tr -d '"')
          # API-Key (.p8) für notarytool ablegen.
          echo "$AC_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/ac_api_key.p8"
          rm -f "$RUNNER_TEMP/cert.p12"
          # Variablen an die folgenden Steps (compile.sh) weiterreichen.
          {
            echo "MAC_SIGN_IDENTITY=$MAC_SIGN_IDENTITY"
            echo "AC_API_KEY_PATH=$RUNNER_TEMP/ac_api_key.p8"
            echo "AC_API_KEY_ID=$AC_API_KEY_ID"
            echo "AC_API_ISSUER_ID=$AC_API_ISSUER_ID"
          } >> "$GITHUB_ENV"
          echo "Keychain bereit, Signatur-Identität: $MAC_SIGN_IDENTITY"

      - name: Client bauen und paketieren (macOS)
        if: runner.os != 'Windows'
        run: bash compile.sh

      - name: Client bauen und paketieren (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: compile.bat

      # Build-Artefakte immer hochladen (auch bei manuellem Lauf ohne Tag)
      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: TeamConference-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.dmg
          if-no-files-found: error

      # Bei einem Tag v* die Dateien an das Release hängen
      - name: An Release anhängen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.dmg
          fail_on_unmatched_files: false

  # ── Debian/Ubuntu: .deb + .tar.gz ──
  build-debian:
    name: Linux .deb (Debian/Ubuntu)
    runs-on: ubuntu-22.04   # breite glibc-Kompatibilität
    steps:
      - uses: actions/checkout@v4

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client

      # Build-Abhängigkeiten des Clients: GTK, ALSA, libclang (bindgen),
      # cmake+ninja (wxWidgets/Opus) und speech-dispatcher (Sprachausgabe).
      - name: Build-Abhängigkeiten
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libclang-dev libgtk-3-dev libasound2-dev libspeechd-dev

      - name: Client bauen (release)
        run: cargo build --release --manifest-path client/Cargo.toml

      - name: Paketieren (.deb + .tar.gz)
        run: bash packaging/linux/build-deb.sh

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: TeamConference-debian
          path: |
            dist/*.deb
            dist/*.tar.gz
          if-no-files-found: error

      - name: An Release anhängen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.tar.gz
          fail_on_unmatched_files: false

  # ── Arch-basierte Distros: .pkg.tar.zst via makepkg ──
  build-arch:
    name: Linux .pkg (Arch)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: System & Build-Abhängigkeiten
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel rust cmake ninja clang gtk3 alsa-lib speech-dispatcher git

      - uses: actions/checkout@v4

      # makepkg verweigert den Lauf als root → eigenen Build-Nutzer anlegen.
      - name: Paketieren (makepkg)
        run: |
          useradd -m builder
          cp packaging/arch/PKGBUILD ./PKGBUILD
          # pkgver aus client/Cargo.toml übernehmen (sonst bleibt das .pkg auf der
          # im PKGBUILD hartcodierten Version — .deb macht es bereits dynamisch).
          VER="$(grep -m1 '^version' client/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          sed -i "s/^pkgver=.*/pkgver=${VER}/" ./PKGBUILD
          echo "PKGBUILD pkgver -> ${VER}"
          chown -R builder:builder "$GITHUB_WORKSPACE"
          sudo -u builder bash -lc "cd '$GITHUB_WORKSPACE' && CMAKE_POLICY_VERSION_MINIMUM=3.5 makepkg -f --noconfirm --skipinteg --nodeps"
          mkdir -p dist
          cp ./*.pkg.tar.zst dist/

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: TeamConference-arch
          path: dist/*.pkg.tar.zst
          if-no-files-found: error

      - name: An Release anhängen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pkg.tar.zst
          fail_on_unmatched_files: false
