[server]
name = "TeamConference Server"
welcome_message = "Willkommen auf dem TeamConference Server!"
max_users = 100

[network]
control_host = "0.0.0.0"
control_port = 9500
audio_host = "0.0.0.0"
audio_port = 9501

[tls]
enabled = true
cert_file = "certs/server.crt"
key_file = "certs/server.key"
auto_generate = true

[audio]
default_sample_rate = 48000
default_bit_depth = 16
default_channels = 1
max_sample_rate = 192000
max_bit_depth = 32

[storage]
database_path = "data/teamconference.db"
upload_dir = "data/uploads"
max_upload_size_mb = 100

[logging]
level = "info"
